# Site root always resolves to the Spanish version. This is the default for the
# Barcelona market; English is reachable via the navbar switcher or by sharing
# the /en/ URL directly. 301 (permanent) consolidates SEO authority on /es/ now
# that the root is a fixed, non-conditional default.
[[redirects]]
  from = "/"
  to = "/es/"
  status = 301
